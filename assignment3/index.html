<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Student Management System</h1>

        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Search Student by Name, Roll No or Course">
        </div>

        <form id="studentForm">

            <div class="form-group">
                <label>Student Name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Enter Student Name">
            </div>

            <div class="form-group">
                <label>Roll Number</label>
                <input
                    type="text"
                    id="roll"
                    placeholder="Enter Roll Number">
            </div>

            <div class="form-group">
                <label>Age</label>
                <input
                    type="number"
                    id="age"
                    placeholder="Enter Age">
            </div>

            <div class="form-group">
                <label>Course</label>
                <input
                    type="text"
                    id="course"
                    placeholder="Enter Course">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email">
            </div>

            <p id="message"></p>

            <div class="btn-group">

                <button type="submit" id="addBtn">
                    Add Student
                </button>

                <button type="button" id="sortAZ">
                    Sort A-Z
                </button>

                <button type="button" id="sortZA">
                    Sort Z-A
                </button>

                <button type="button" id="darkMode">
                    🌙 Dark Mode
                </button>

            </div>

        </form>

        <div class="counter">
            <h3>Total Students :
                <span id="studentCount">0</span>
            </h3>
        </div>

        <h3 id="emptyState">
            No Students Found
        </h3>

        <table id="studentTable">

            <thead>

                <tr>

                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Age</th>
                    <th>Course</th>
                    <th>Email</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="studentBody">


            </tbody>

        </table>

    </div>

    <script src="app.js"></script>
</body>
</html>
